apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ceylon-sentinel-ingress
  namespace: ceylon-sentinel
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - app.ceylonsentinel.ai
    - api.ceylonsentinel.ai
    secretName: ceylon-sentinel-tls
  rules:
  - host: app.ceylonsentinel.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: api.ceylonsentinel.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
