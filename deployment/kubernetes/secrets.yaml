apiVersion: v1
kind: Secret
metadata:
  name: ceylon-sentinel-secrets
  namespace: ceylon-sentinel
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "secure_postgres_password"
  POSTGRES_DB: "ceylonsentinel"
  DATABASE_URL: "postgresql://postgres:secure_postgres_password@postgres:5432/ceylonsentinel"
  SECRET_KEY: "enterprise-super-secret-key-change-in-prod"
  OPENAI_API_KEY: "sk-mock-key"
  WEATHER_API_KEY: "mock-key"
  NEWS_API_KEY: "mock-key"
